services:
  aitest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aitest-app
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
